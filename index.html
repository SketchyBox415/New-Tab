<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>

body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1f2937, #0d1117);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* SEARCH BAR (GLASS EFFECT) */

#search {
    height: 60px;
    width: 720px;

    position: fixed;
    top: 170px;
    left: 50%;
    transform: translateX(-50%);

    border-radius: 40px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.15);

    display: flex;
    align-items: center;

    padding-left: 15px;

    transition: all 0.25s ease;
    z-index: 100;
}

/* Hover glow */

#search:hover{
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* Input */

input{
    width:100%;
    height:100%;
    margin-left: 7px;
    border:none;
    background:transparent;
    color:white;
    font-size:18px;
}

input:focus{
    outline:none;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
    font-size:17px;
}

/* Suggestions */

#suggestions{
    position:absolute;
    top:65px;
    left:0;
    right:0;

    background: rgba(25,30,39,0.9);
    backdrop-filter: blur(14px);

    border-radius:20px;
    overflow:hidden;

    border:1px solid rgba(255,255,255,0.1);

    display:none;
    z-index: 9999;
}

.suggestion{
    padding:12px 18px;
    color:white;
    cursor:pointer;

    transition: background 0.15s ease;
}

.suggestion:hover,
.suggestion.active{
    background:rgba(255,255,255,0.08);
}

/* Widgets */

#widget_container{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:270px;
}

/* Glass cards */

.card{
    width:200px;
    height:200px;

    border-radius:30px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);

    border:1px solid rgba(255,255,255,0.1);

    display:flex;
    justify-content:center;
    align-items:center;

    transition: all 0.25s ease;
}

/* Smooth hover */

.card:hover{
    transform: translateY(-12px) scale(1.03);

    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.5),
        0 0 20px rgba(255,255,255,0.05);
}

/* Icons */

img{
    width:60px;
    height:auto;
}

.circle{
    width:115px;
    height:115px;

    background:white;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;
}
    </style>
</head>
<body>
    <div id="search">
        <input id="searchInput" type="text" placeholder="Search" autocomplete="off">
        <div id="suggestions"></div>
    </div>
    <div id="widget_container">
        <div class="widget1 card">

        </div>
        <a href="https://www.youtube.com">
            <div class="widget2 card">
                <div class="circle">
                    <img src="Youtube_icon.ico">
                </div>
            </div>
        </a>
        <a href="https://www.github.com/SketchyBox415">
            <div class="widget3 card">
                <div class="circle">
                    <img src="github_icon.ico">
                </div>
            </div>
        </a>
    </div>

    <script src="script.js"></script>

</body>
</html>
